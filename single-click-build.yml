name: Build Jarvis Single Workflow

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Whole Android Project Files Automatically
      run: |
        # 1. Create Directory Structure
        mkdir -p app/src/main/java/com/jarvis/automation
        mkdir -p app/src/main/res/values

        # 2. Write Root Settings Files
        cat << 'EOF' > build.gradle
        plugins { id 'com.android.application' version '8.5.0' apply false }
        EOF

        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        rootProject.name = "JarvisAutomation"
        include ':app'
        EOF

        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        org.gradle.jvmargs=-Xmx2048m
        EOF

        # 3. Write App-level Build File
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            compileSdk 34
            defaultConfig {
                applicationId "com.jarvis.automation"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.core:core:1.12.0'
        }
        EOF

        # 4. Write Android Manifest with Permissions
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CONNECTED_DEVICE" />
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
            <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.CALL_PHONE" />
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.HIGH_SAMPLING_RATE_SENSORS" />
            <application android:allowBackup="false" android:label="Jarvis" android:supportsRtl="true" tools:targetApi="34">
                <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service android:name=".BackgroundAutomationService" android:exported="false" android:foregroundServiceType="microphone|mediaPlayback|connectedDevice" />
                <receiver android:name=".BluetoothHeadsetReceiver" android:exported="true">
                    <intent-filter>
                        <action android:name="android.bluetooth.device.action.ACL_CONNECTED" />
                        <action android:name="android.bluetooth.device.action.ACL_DISCONNECTED" />
                    </intent-filter>
                </receiver>
                <service android:name=".WhatsAppNotificationListener" android:exported="true" android:label="Jarvis Auto-Reply" android:permission="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE">
                    <intent-filter><action android:name="android.service.notification.NotificationListenerService" /></intent-filter>
                </service>
            </application>
        </manifest>
        EOF

        # 5. Write Dummy MainActivity to allow compilation
        cat << 'EOF' > app/src/main/java/com/jarvis/automation/MainActivity.java
        package com.jarvis.automation;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); }
        }
        EOF

        # 6. Write Actions Config
        cat << 'EOF' > app/src/main/java/com/jarvis/automation/Actions.java
        package com.jarvis.automation;
        public final class Actions {
            public static final String ACTION_HEADSET_CONNECTED = "com.jarvis.automation.action.HEADSET_CONNECTED";
            public static final String ACTION_HEADSET_DISCONNECTED = "com.jarvis.automation.action.HEADSET_DISCONNECTED";
            private Actions() { }
        }
        EOF

        # 7. Write Background Automation Service (Shake & Setup)
        cat << 'EOF' > app/src/main/java/com/jarvis/automation/BackgroundAutomationService.java
        package com.jarvis.automation;
        import android.app.Service;
        import android.content.Intent;
        import android.os.IBinder;
        public class BackgroundAutomationService extends Service {
            @Override public void onCreate() { super.onCreate(); }
            @Override public int onStartCommand(Intent intent, int flags, int startId) { return START_STICKY; }
            @Override public IBinder onBind(Intent intent) { return null; }
        }
        EOF

        # 8. Write Bluetooth Receiver
        cat << 'EOF' > app/src/main/java/com/jarvis/automation/BluetoothHeadsetReceiver.java
        package com.jarvis.automation;
        import android.content.BroadcastReceiver;
        import android.content.Context;
        import android.content.Intent;
        public class BluetoothHeadsetReceiver extends BroadcastReceiver {
            @Override public void onReceive(Context context, Intent intent) {}
        }
        EOF

        # 9. Write WhatsApp Notification Listener
        cat << 'EOF' > app/src/main/java/com/jarvis/automation/WhatsAppNotificationListener.java
        package com.jarvis.automation;
        import android.service.notification.NotificationListenerService;
        public class WhatsAppNotificationListener extends NotificationListenerService {}
        EOF

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v3

    - name: Run Build Process
      run: gradle assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Single-Click-App
        path: app/build/outputs/apk/debug/*.apk
